# Variant B — Counterfactual Duration-Debiased BERT4Rec
# Extends BERT4Rec with adversarial debiasing and ordinal engagement

# BERT4Rec backbone
n_layers: 2
n_heads: 2
hidden_size: 128
inner_size: 512
hidden_dropout_prob: 0.2
attn_dropout_prob: 0.2
hidden_act: gelu
layer_norm_eps: 1.0e-12
mask_ratio: 0.2
initializer_range: 0.02
loss_type: CE

# Variant B specific
lambda_ordinal: 0.3
lambda_d2q: 0.2
lambda_adversarial: 0.02
lambda_contrastive: 0.1
contrastive_temp: 0.1
n_ordinal_levels: 5
grl_lambda: 0.1
