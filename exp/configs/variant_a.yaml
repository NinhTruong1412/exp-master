# Variant A — Duration-Aware Multi-Task BERT4Rec
# Extends BERT4Rec with watch-time prediction and contrastive learning

# BERT4Rec backbone
n_layers: 2
n_heads: 2
hidden_size: 128
inner_size: 512
hidden_dropout_prob: 0.2
attn_dropout_prob: 0.2
hidden_act: gelu
layer_norm_eps: 1.0e-12
mask_ratio: 0.2
initializer_range: 0.02
loss_type: CE

# Variant A specific
lambda_ratio: 0.3
lambda_pair: 0.2
lambda_contrastive: 0.1
contrastive_temp: 0.1
watch_ratio_threshold: 0.3
